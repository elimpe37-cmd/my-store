<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCOUNT SHOP PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#05050a;color:#fff;}
header{background:linear-gradient(90deg,#000,#ff0050,#6a00ff);padding:15px;text-align:center;}
.container{padding:15px;max-width:1100px;margin:auto;}

.admin{background:#151520;padding:15px;border-radius:12px;margin-bottom:15px;display:none;}

input{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;}

.btn{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;margin-top:6px;}
.green{background:#00ff99;color:#000;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}

.card{background:#12121a;padding:12px;border-radius:12px;}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-top:8px;}

.price{color:#00ff99;font-weight:bold;}
.badge{display:inline-block;padding:4px 8px;background:#ff0050;border-radius:6px;font-size:11px;margin-top:5px;}
</style>
</head>

<body>

<header>
<h2>⚡ DISCOUNT SHOP PRO</h2>
<p>Online Store</p>
</header>

<div class="container">

<!-- ADMIN -->
<div id="adminPanel" class="admin">
<h3>🛠 Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<input id="img" placeholder="Image URL">
<input id="delivery" placeholder="Delivery fee">
<input id="time" placeholder="Delivery time">

<button class="btn green" onclick="addProduct()">Add Product</button>
</div>

<h3>🛍 Products</h3>
<div class="grid" id="products"></div>

</div>

<script>

// 🔥 FIREBASE SETUP (YOUR PROJECT)
const firebaseConfig = {
  apiKey: "AIzaSyAwayCx-surIdWV_sgSFY35J6aHG5l7mMU",
  authDomain: "discountshop-7504f.firebaseapp.com",
  projectId: "discountshop-7504f",
  storageBucket: "discountshop-7504f.appspot.com",
  messagingSenderId: "332182883275",
  appId: "1:332182883275:web:b2ddb10d9a6e7f90a3844e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 ADMIN KEY
const SECRET_KEY = "1234";

// ================= ADMIN ACCESS =================
document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key.toLowerCase() === "a"){
    let key = prompt("Enter admin key");
    if(key === SECRET_KEY){
      document.getElementById("adminPanel").style.display = "block";
      alert("Admin unlocked");
    }
  }
});

// ================= MOBILE HOLD =================
let holdTimer;

document.body.addEventListener("touchstart", function(){
  holdTimer = setTimeout(()=>{
    let key = prompt("Enter admin key");
    if(key === SECRET_KEY){
      document.getElementById("adminPanel").style.display = "block";
      alert("Admin unlocked");
    }
  }, 3000);
});

document.body.addEventListener("touchend", function(){
  clearTimeout(holdTimer);
});

// ================= ADD PRODUCT =================
function addProduct(){

let name = document.getElementById("name").value;
let price = Number(document.getElementById("price").value);
let stock = Number(document.getElementById("stock").value);
let img = document.getElementById("img").value;
let delivery = document.getElementById("delivery").value;
let time = document.getElementById("time").value;

if(!name || !price || !stock){
alert("Fill all fields");
return;
}

db.collection("products").add({
  name,
  price,
  stock,
  img: img || "https://via.placeholder.com/300",
  delivery: delivery || "0",
  time: time || "3-7 days"
})
.then(()=>{
  alert("Product Added");
})
.catch(err=>{
  alert("Error: " + err.message);
});

// clear
document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("stock").value="";
document.getElementById("img").value="";
document.getElementById("delivery").value="";
document.getElementById("time").value="";
}

// ================= LOAD PRODUCTS =================
db.collection("products").onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
let p = doc.data();

html += `
<div class="card">
<h3>${p.name}</h3>
<img src="${p.img}">
<p class="price">$${p.price}</p>
<p>Stock: ${p.stock}</p>
<span class="badge">🚚 ${p.delivery}</span><br>
<span class="badge">⏱ ${p.time}</span>
</div>
`;
});

document.getElementById("products").innerHTML = html;
});

</script>

</body>
</html>

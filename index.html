<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCOUNT SHOP 247</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#05050a;color:#fff;overflow-x:hidden;}
header{background:linear-gradient(90deg,#000,#ff0050,#6a00ff);padding:18px;text-align:center;position:sticky;top:0;z-index:1000;}
header h1{margin:0;font-size:28px;}
.sub{font-size:13px;opacity:.85}

.ticker{background:#ff0050;padding:8px;white-space:nowrap;overflow:hidden;font-weight:bold;}
.ticker span{display:inline-block;padding-left:100%;animation:scroll 10s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

.stats{display:flex;justify-content:center;gap:10px;padding:10px;font-size:12px;}
.stat{background:#151520;padding:8px;border-radius:10px;}

.container{padding:15px;}
.search{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:15px;}

.card{background:#12121a;border-radius:14px;padding:12px;}
.badge{background:#ff0050;padding:5px 8px;font-size:11px;border-radius:6px;display:inline-block;}
.stock{float:right;background:#000;padding:5px 8px;font-size:11px;border-radius:6px;}
.price{color:#00ff99;font-weight:bold;margin:5px 0;}

.btn{width:100%;padding:10px;border:none;border-radius:10px;cursor:pointer;margin-top:6px;font-weight:bold;}
.buy{background:#ff0050;color:#fff;}
.cart{background:#00c2ff;color:#000;}

.bottomBar{position:fixed;bottom:0;left:0;right:0;background:#000;padding:10px;display:flex;justify-content:space-between;}
.cartBtn{background:#ff0050;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center;}
.modal-content{background:#fff;color:#000;padding:15px;border-radius:12px;width:90%;max-width:360px;}
.modal input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
.close{float:right;cursor:pointer;}

.chatBtn{
position:fixed;right:20px;bottom:80px;
background:#6a00ff;color:#fff;
border:none;padding:12px 15px;
border-radius:50px;cursor:pointer;
}

.chatBox{
position:fixed;right:20px;bottom:140px;
width:280px;height:320px;
background:#111;border-radius:12px;
display:none;flex-direction:column;
border:1px solid #333;
}

.chatHeader{background:#ff0050;padding:10px;}
.chatMessages{flex:1;overflow-y:auto;padding:10px;font-size:13px;}
.chatInput{display:flex;}
.chatInput input{flex:1;padding:8px;border:none;}
.chatInput button{padding:8px;border:none;background:#00ff99;font-weight:bold;}

.msg{margin:5px 0;padding:6px;border-radius:8px;}
.me{background:#6a00ff;}
.them{background:#222;}

.toast{position:fixed;bottom:60px;left:15px;background:#000;padding:10px;border-radius:10px;opacity:0;transition:.3s;}
.toast.show{opacity:1;}
</style>
</head>

<body>

<header>
<h1>⚡ DISCOUNT SHOP 247</h1>
<div class="sub">Fast Delivery • Secure Store • AI Sales</div>
</header>

<div class="ticker"><span>🔥 BEST DEALS DAILY • FAST SHIPPING • NEW PRODUCTS UPDATED 🚀</span></div>

<div class="stats">
<div class="stat">👀 Views: <span id="views">0</span></div>
<div class="stat">🛒 Orders: <span id="orders">0</span></div>
<div class="stat">💰 Revenue: $<span id="rev">0</span></div>
</div>

<div class="container">
<input class="search" id="search" placeholder="Search products..." onkeyup="render()">
<div class="products" id="list"></div>
</div>

<div class="bottomBar">
<div>🛒 Cart: <span id="cart">0</span></div>
<button class="cartBtn" onclick="checkout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h3>Checkout</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button class="btn buy" onclick="sendOrder()">Place Order</button>
</div>
</div>

<!-- CHAT -->
<button class="chatBtn" onclick="toggleChat()">💬 Chat</button>

<div class="chatBox" id="chatBox">
<div class="chatHeader">Live Chat Support</div>
<div class="chatMessages" id="messages"></div>
<div class="chatInput">
<input id="chatText" placeholder="Message...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>

let products=[
{name:"Power Bank",price:55,stock:3},
{name:"Earbuds",price:30,stock:5},
{name:"Smart Watch",price:70,stock:4}
];

let cart=[];

/* PRODUCTS */
function render(){
let q=document.getElementById("search").value.toLowerCase();
let list=document.getElementById("list");
list.innerHTML="";

products.filter(p=>p.name.toLowerCase().includes(q)).forEach((p,i)=>{
list.innerHTML+=`
<div class="card">
<div class="badge">HOT</div>
<div class="stock">${p.stock}</div>
<h3>${p.name}</h3>
<div class="price">$${p.price}</div>
<button class="btn cart" onclick="add(${i})">Add</button>
<button class="btn buy" onclick="buyNow(${i})">Buy</button>
</div>`;
});
}

function add(i){
cart.push(products[i]);
document.getElementById("cart").innerText=cart.length;
toast("Added");
}

function buyNow(i){
cart=[products[i]];
checkout();
}

/* CHECKOUT */
function checkout(){
if(!cart.length)return toast("Cart empty");
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function sendOrder(){
alert("Order placed successfully!");
cart=[];
document.getElementById("cart").innerText=0;
closeModal();
}

/* CHAT */
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function sendMsg(){
let input=document.getElementById("chatText");
if(!input.value)return;

let box=document.getElementById("messages");
box.innerHTML+=`<div class="msg me">${input.value}</div>`;
input.value="";
}

function toast(t){
let x=document.getElementById("toast");
x.innerText=t;
x.classList.add("show");
setTimeout(()=>x.classList.remove("show"),2000);
}

/* FAKE VIEWS */
setInterval(()=>{
document.getElementById("views").innerText=Math.floor(Math.random()*900+100);
},2000);

render();

</script>

</body>
</html>

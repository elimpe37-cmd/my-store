<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCOUNTSHOP 247 PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#05050a;color:#fff;}
header{background:linear-gradient(90deg,#000,#ff0050,#6a00ff);padding:15px;text-align:center;}
.container{padding:15px;max-width:1100px;margin:auto;}

input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;}

.btn{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;margin-top:6px;}
.green{background:#00ff99;color:#000;}
.red{background:#ff0033;color:#fff;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.card{background:#12121a;padding:12px;border-radius:12px;}

#chatBox{position:fixed;bottom:80px;right:20px;width:300px;background:#111;border-radius:12px;display:none;flex-direction:column;z-index:9999;}
#chatMessages{height:200px;overflow:auto;padding:10px;font-size:13px;}

#ordersPanel{background:#111;padding:10px;margin-top:10px;}
</style>
</head>

<body>

<header>
<h2>⚡ DISCOUNTSHOP 247 PRO</h2>
<p>🚚 Fast Delivery | 🔒 Secure Shipping</p>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">
<h3>🔐 Admin Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn green" onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;">
<h3>🛠 Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL 1">
<input id="img2" placeholder="Image URL 2 (optional)">
<button class="btn green" onclick="addProduct()">Add Product</button>

<button class="btn red" onclick="logout()">Logout</button>

<h3>📦 Orders</h3>
<div id="ordersPanel"></div>
</div>

<h3>🛍 Products</h3>
<div class="grid" id="products"></div>

</div>

<!-- CHAT -->
<div id="chatBox">
<div style="background:#ff0050;padding:10px;">💬 Live Chat</div>
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Message...">
<button onclick="sendMsg()" class="btn green">Send</button>
</div>

<button onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;background:#ff0050;color:#fff;border:none;padding:12px;border-radius:50px;">💬</button>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAwayCx-surIdWV_sgSFY35J6aHG5l7mMU",
  authDomain: "discountshop-7504f.firebaseapp.com",
  projectId: "discountshop-7504f",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

const ADMINS = ["admin@gmail.com"];
let isAdmin = false;

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(user=>{
isAdmin = ADMINS.includes(user.user.email);

loginBox.style.display="none";
if(isAdmin){
adminPanel.style.display="block";
loadOrders();
}
})
.catch(()=>alert("Login failed"));
}

// LOGOUT
function logout(){
auth.signOut().then(()=>location.reload());
}

// ADD PRODUCT (LINK IMAGES)
function addProduct(){
if(!isAdmin) return;

db.collection("products").add({
name:name.value,
price:Number(price.value),
img:img.value,
img2:img2.value || ""
});

alert("Product added");
}

// PRODUCTS
db.collection("products").onSnapshot(snap=>{
let html="";

snap.forEach(doc=>{
let p=doc.data();

html+=`
<div class="card">
<h3>${p.name}</h3>

<img src="${p.img}" style="width:100%;height:150px;object-fit:contain;">
${p.img2 ? `<img src="${p.img2}" style="width:100%;height:150px;object-fit:contain;">` : ""}

<p>$${p.price}</p>

<button class="btn green" onclick="order('${p.name}',${p.price})">Order</button>

${isAdmin ? `<button class="btn red" onclick="deleteProduct('${doc.id}')">Delete</button>` : ""}

</div>
`;
});

products.innerHTML=html;
});

// DELETE
function deleteProduct(id){
if(!isAdmin) return;
db.collection("products").doc(id).delete();
}

// ORDER
function order(name,price){
let cname=prompt("Name");
let phone=prompt("Phone");

db.collection("orders").add({
name,price,cname,phone,status:"pending"
});

alert("Order sent");
}

// ORDERS
function loadOrders(){
db.collection("orders").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let o=doc.data();

html+=`
<div style="background:#222;margin:5px;padding:5px;">
${o.name} - ${o.cname} (${o.phone}) - ${o.status}
<button onclick="done('${doc.id}')">Done</button>
</div>
`;
});

ordersPanel.innerHTML=html;
});
}

function done(id){
if(!isAdmin) return;
db.collection("orders").doc(id).update({status:"delivered"});
}

// CHAT
const userId = localStorage.getItem("uid") || Date.now().toString();
localStorage.setItem("uid",userId);

function toggleChat(){
chatBox.style.display = chatBox.style.display==="flex"?"none":"flex";
}

function sendMsg(){
db.collection("chats").add({
msg:chatInput.value,
uid:userId,
time:Date.now()
});
chatInput.value="";
}

db.collection("chats").orderBy("time").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let c=doc.data();
if(c.uid===userId){
html+=`<div style="background:#222;margin:5px;padding:5px;">${c.msg}</div>`;
}
});
chatMessages.innerHTML=html;
});

</script>

</body>
</html>

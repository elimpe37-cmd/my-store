<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DISCOUNTSHOP</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#05050a;color:#fff;overflow-x:hidden;}
header{background:linear-gradient(90deg,#000,#ff0050,#6a00ff);padding:18px;text-align:center;position:sticky;top:0;z-index:1000;}
header h1{margin:0;font-size:28px;}
.sub{font-size:13px;opacity:.85}

.ticker{background:#ff0050;padding:8px;white-space:nowrap;overflow:hidden;font-weight:bold;}
.ticker span{display:inline-block;padding-left:100%;animation:scroll 10s linear infinite;}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

.stats{display:flex;justify-content:center;gap:10px;padding:10px;font-size:12px;}
.stat{background:#151520;padding:8px 10px;border-radius:10px;}

.container{padding:15px;}
.search{width:100%;padding:12px;border-radius:10px;border:none;margin-bottom:10px;}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:15px;}

.card{background:#12121a;border-radius:14px;padding:12px;position:relative;}
.badge{position:absolute;top:10px;left:10px;background:#ff0050;padding:5px 8px;font-size:11px;border-radius:6px;}
.stock{position:absolute;top:10px;right:10px;background:#000;padding:5px 8px;font-size:11px;border-radius:6px;}

.price{color:#00ff99;font-weight:bold;margin:5px 0;}

.btn{width:100%;padding:10px;border:none;border-radius:10px;cursor:pointer;margin-top:6px;font-weight:bold;}
.buy{background:#ff0050;color:#fff}
.cart{background:#00c2ff;color:#000}

.bottomBar{position:fixed;bottom:0;left:0;right:0;background:#000;padding:10px;display:flex;justify-content:space-between;align-items:center}
.cartBtn{background:#ff0050;border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center}
.modal-content{background:#fff;color:#000;padding:15px;border-radius:12px;width:90%;max-width:360px}
.modal input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
.close{float:right;cursor:pointer}

.toast{position:fixed;bottom:60px;left:15px;background:#000;padding:10px;border-radius:10px;opacity:0;transition:.3s}
.toast.show{opacity:1}

.admin{background:#151520;margin:10px;padding:10px;border-radius:10px}
.admin input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none}
</style>
</head>

<body>

<header>
<h1>⚡ DISCOUNTSHOP</h1>
<div class="sub">TikTok Sales Engine • Best Deals Online • Fast Delivery & Secured Shipping</div>
</header>

<div class="ticker">
<span>🚨 DISCOUNTSHOP LIVE • BEST PRICES ACTIVE • FAST DELIVERY & SECURED SHIPPING AVAILABLE 🚚🔒</span>
</div>

<div class="stats">
<div class="stat">👀 Views: <span id="views">0</span></div>
<div class="stat">🛒 Orders: <span id="orders">0</span></div>
<div class="stat">🛍 Cart: <span id="cart">0</span></div>
</div>

<div class="container">

<input class="search" id="search" placeholder="Search products..." onkeyup="render()" />

<div class="admin">
<b>Admin Panel</b>
<input id="pname" placeholder="Product name" />
<input id="pprice" placeholder="Price" />
<button class="btn buy" onclick="addProduct()">Add Product</button>
</div>

<div class="products" id="list"></div>
</div>

<div class="bottomBar">
<div>🛒 Cart Items</div>
<button class="cartBtn" onclick="checkout()">Checkout</button>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<h3>Checkout</h3>
<input id="name" placeholder="Name" />
<input id="phone" placeholder="Phone" />
<input id="address" placeholder="Address" />
<button class="btn buy" onclick="sendOrder()">Send Order</button>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [
{name:'Power Bank',price:55,stock:3,img:['https://via.placeholder.com/300']},
{name:'Earbuds',price:30,stock:5,img:['https://via.placeholder.com/300']}
];

let cart = [];
let orders = 0;

function render(){
let q=document.getElementById('search').value.toLowerCase();
let list=document.getElementById('list');
list.innerHTML='';

products.filter(p=>p.name.toLowerCase().includes(q)).forEach((p,i)=>{
list.innerHTML+=`
<div class='card'>
<div class='badge'>HOT</div>
<div class='stock'>${p.stock}</div>

<h3>${p.name}</h3>
<div class='price'>$${p.price}</div>

<button class='btn cart' onclick='add(${i})'>Add to Cart</button>
<button class='btn buy' onclick='buyNow(${i})'>Buy Now</button>
</div>`;
});
}

function addProduct(){
let name=document.getElementById('pname').value;
let price=parseFloat(document.getElementById('pprice').value);

if(!name || !price) return toast("Fill all fields");

products.push({
name:name,
price:price,
stock:5,
img:['https://via.placeholder.com/300']
});

localStorage.setItem('products', JSON.stringify(products));

document.getElementById('pname').value='';
document.getElementById('pprice').value='';

render();
toast("Product added");
}

function add(i){
cart.push(products[i]);
document.getElementById('cart').innerText=cart.length;
toast("Added to cart");
}

function buyNow(i){
cart=[products[i]];
checkout();
}

function checkout(){
if(!cart.length) return toast("Cart empty");
document.getElementById('modal').style.display='flex';
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function sendOrder(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;

if(!name || !phone || !address) return toast("Fill all fields");

orders++;
document.getElementById('orders').innerText=orders;

let msg=`ORDER\nItems: ${cart.map(c=>c.name).join(', ')}\nName: ${name}\nPhone: ${phone}\nAddress: ${address}`;

let wa='https://wa.me/237000000000?text='+encodeURIComponent(msg);
window.open(wa);

cart=[];
document.getElementById('cart').innerText=0;

closeModal();
toast("Order sent");
}

function toast(t){
let x=document.getElementById('toast');
x.innerText=t;
x.classList.add('show');
setTimeout(()=>x.classList.remove('show'),2000);
}

function fakeViews(){
setInterval(()=>{
document.getElementById('views').innerText =
Math.floor(Math.random()*900+100);
},2000);
}

function fakeOrders(){
setInterval(()=>{
let live = orders + Math.floor(Math.random()*3);
document.getElementById('orders').innerText = live;
},2500);
}

fakeViews();
fakeOrders();
render();
</script>

</body>
</html>

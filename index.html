<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;padding:15px}
.box{background:#222;padding:10px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px}
button{background:#00ff99;border:none}
h2{color:#ff0050}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>

<h3>Add Product</h3>
<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">
<button onclick="add()">Add</button>

<h3>Orders</h3>
<div id="orders"></div>

<script>

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ADD PRODUCT
function add(){
db.collection("products").add({
name:name.value,
price:Number(price.value),
img:img.value
});
alert("Product added");
}

// LOAD ORDERS
db.collection("orders").orderBy("time","desc")
.onSnapshot(snap=>{
let html="";
snap.forEach(d=>{
let o=d.data();

html+=`
<div class="box">
<p>📦 ${o.product}</p>
<p>👤 ${o.customerName}</p>
<p>📞 ${o.phone}</p>
<p>🏠 ${o.address}</p>
<p>Status: ${o.status}</p>

<button onclick="db.collection('orders').doc('${d.id}').update({status:'delivered'})">
Mark Delivered
</button>
</div>
`;
});

orders.innerHTML=html;
});

</script>

</body>
</html>

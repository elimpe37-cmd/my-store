<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISCOUNT SHOP PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#05050a;color:#fff;}
header{background:linear-gradient(90deg,#000,#ff0050,#6a00ff);padding:15px;text-align:center;}

.container{padding:15px;max-width:1100px;margin:auto;}

.admin{background:#151520;padding:15px;border-radius:12px;margin-bottom:15px;display:none;}

input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;}

.btn{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;width:100%;margin-top:6px;}
.green{background:#00ff99;color:#000;}
.red{background:#ff0033;color:#fff;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}

.card{background:#12121a;padding:12px;border-radius:12px;position:relative;}

.slider{position:relative;width:100%;height:180px;overflow:hidden;border-radius:10px;}
.slider img{width:100%;height:180px;object-fit:contain;background:#000;display:none;}
.slider img.active{display:block;}

.nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.6);border:none;color:#fff;padding:5px 10px;cursor:pointer;}
.prev{left:5px;}
.next{right:5px;}

.price{color:#00ff99;font-weight:bold;}

.deleteBtn{position:absolute;top:10px;right:10px;background:#ff0033;border:none;color:#fff;padding:5px 8px;border-radius:6px;cursor:pointer;display:none;}
.adminMode .deleteBtn{display:block;}

/* CHAT */
#chatBox{
position:fixed;bottom:80px;right:20px;width:300px;background:#111;
border-radius:12px;display:none;flex-direction:column;z-index:9999;
}
#chatMessages{height:200px;overflow:auto;padding:10px;font-size:13px;}

/* ORDER */
#orderModal{
display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
justify-content:center;align-items:center;z-index:9999;
}
#orderBox{
background:#111;padding:15px;border-radius:12px;width:90%;max-width:400px;
}
</style>
</head>

<body>

<header>
<h2>⚡ DISCOUNT SHOP PRO</h2>
<p>Online Store</p>
</header>

<div class="container">

<!-- ADMIN -->
<div id="adminPanel" class="admin">
<h3>🛠 Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<input id="img1" placeholder="Image 1 URL">
<input id="img2" placeholder="Image 2 URL">
<input id="delivery" placeholder="Delivery fee">
<input id="time" placeholder="Delivery time">

<button class="btn green" onclick="addProduct()">Add Product</button>

<button class="btn green" onclick="openOrders()">📦 View Orders</button>

<div id="adminOrders" style="margin-top:10px;"></div>
</div>

<h3>🛍 Products</h3>
<div class="grid" id="products"></div>

</div>

<!-- CHAT -->
<div id="chatBox">
<div style="background:#ff0050;padding:10px;">💬 Live Chat</div>
<div id="chatMessages"></div>
<input id="chatInput" placeholder="Message...">
<button onclick="sendMsg()" class="btn green">Send</button>
</div>

<button onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;background:#ff0050;color:#fff;border:none;padding:12px;border-radius:50px;z-index:9999;">
💬 Chat
</button>

<!-- ORDER -->
<div id="orderModal">
<div id="orderBox">
<h3>📦 Place Order</h3>

<input id="cname" placeholder="Full Name">
<input id="cphone" placeholder="Phone">
<textarea id="caddress" placeholder="Delivery Address"></textarea>

<button class="btn green" onclick="submitOrder()">Confirm Order</button>
<button class="btn red" onclick="closeOrder()">Cancel</button>
</div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyAwayCx-surIdWV_sgSFY35J6aHG5l7mMU",
authDomain: "discountshop-7504f.firebaseapp.com",
projectId: "discountshop-7504f",
storageBucket: "discountshop-7504f.appspot.com",
messagingSenderId: "332182883275",
appId: "1:332182883275:web:b2ddb10d9a6e7f90a3844e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SECRET_KEY = "1234";
let selectedProduct=null;

// ADMIN OPEN (HOLD)
let holdTimer;
document.body.addEventListener("touchstart",()=>{
holdTimer=setTimeout(()=>{
let key=prompt("Admin key");
if(key===SECRET_KEY){
document.getElementById("adminPanel").style.display="block";
document.body.classList.add("adminMode");
}
},3000);
});
document.body.addEventListener("touchend",()=>clearTimeout(holdTimer));

// ADD PRODUCT
function addProduct(){
db.collection("products").add({
name:document.getElementById("name").value,
price:Number(document.getElementById("price").value),
stock:Number(document.getElementById("stock").value),
img:[
document.getElementById("img1").value||"https://via.placeholder.com/300",
document.getElementById("img2").value||"https://via.placeholder.com/300"
],
delivery:document.getElementById("delivery").value||"0",
time:document.getElementById("time").value||"3-7 days"
});
alert("Product Added");
}

// DELETE PRODUCT
function deleteProduct(id){
if(confirm("Delete product?")){
db.collection("products").doc(id).delete();
}
}

// SLIDER
function slide(id,dir){
let imgs=document.querySelectorAll(`#p-${id} img`);
let i=0;
imgs.forEach((img,x)=>{if(img.classList.contains("active"))i=x;img.classList.remove("active");});
i+=dir;
if(i<0)i=imgs.length-1;
if(i>=imgs.length)i=0;
imgs[i].classList.add("active");
}

// ORDER
function orderProduct(name,price){
selectedProduct={name,price};
document.getElementById("orderModal").style.display="flex";
}

function closeOrder(){
document.getElementById("orderModal").style.display="none";
}

function submitOrder(){
db.collection("orders").add({
product:selectedProduct.name,
price:selectedProduct.price,
customerName:document.getElementById("cname").value,
phone:document.getElementById("cphone").value,
address:document.getElementById("caddress").value,
status:"pending",
time:Date.now()
});
alert("Order Sent Successfully!");
closeOrder();
}

// VIEW ORDERS (ADMIN)
function openOrders(){
document.getElementById("adminOrders").style.display="block";
}

// LOAD ORDERS
db.collection("orders").orderBy("time").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let o=doc.data();
html+=`
<div style="background:#000;padding:8px;margin:5px;border-radius:8px;">
<p>📦 ${o.product}</p>
<p>👤 ${o.customerName}</p>
<p>📞 ${o.phone}</p>
<p>🏠 ${o.address}</p>
<p>📌 ${o.status}</p>

<button onclick="db.collection('orders').doc('${doc.id}').update({status:'delivered'})"
style="background:#00ff99;border:none;padding:5px;">
✔ Done
</button>
</div>
`;
});
document.getElementById("adminOrders").innerHTML=html;
});

// CHAT
function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display=box.style.display==="flex"?"none":"flex";
}

function sendMsg(){
let msg=document.getElementById("chatInput").value;
if(!msg)return;

db.collection("chats").add({
message:msg,
sender:"customer",
time:Date.now()
});

document.getElementById("chatInput").value="";
}

// LOAD CHAT
db.collection("chats").orderBy("time").onSnapshot(snap=>{
let html="";
snap.forEach(d=>{
let m=d.data();
html+=`<div style="margin:5px;padding:6px;background:${m.sender==='admin'?'#00ff99':'#222'};color:${m.sender==='admin'?'#000':'#fff'}">${m.message}</div>`;
});
document.getElementById("chatMessages").innerHTML=html;
});

// LOAD PRODUCTS
db.collection("products").onSnapshot(snap=>{
let html="";
snap.forEach(doc=>{
let p=doc.data();
let id=doc.id;

html+=`
<div class="card">

<h3>${p.name}</h3>

<div class="slider" id="p-${id}">
<img class="active" src="${p.img[0]}">
<img src="${p.img[1]}">

<button class="nav prev" onclick="slide('${id}',-1)">❮</button>
<button class="nav next" onclick="slide('${id}',1)">❯</button>
</div>

<p class="price">$${p.price}</p>

<button class="btn green" onclick="orderProduct('${p.name}',${p.price})">🛒 Order</button>

</div>
`;
});

document.getElementById("products").innerHTML=html;
});

</script>

</body>
</html>
